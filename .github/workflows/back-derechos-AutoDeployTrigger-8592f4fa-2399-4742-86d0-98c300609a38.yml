name: Trigger auto deployment for back-derechos

on:
  push:
    branches:
      [ main ]
    paths:
      - 'BackDerechosPeru/**'
      - '.github/workflows/back-derechos-AutoDeployTrigger-8592f4fa-2399-4742-86d0-98c300609a38.yml'

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.BACKDERECHOS_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.BACKDERECHOS_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.BACKDERECHOS_AZURE_SUBSCRIPTION_ID }}

      # Build directo del Dockerfile (sin el builder Oryx del deploy-action, que
      # rompió upstream con "Unrecognized command or argument 'process'").
      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: derechosperuacr2026.azurecr.io
          username: ${{ secrets.BACKDERECHOS_REGISTRY_USERNAME }}
          password: ${{ secrets.BACKDERECHOS_REGISTRY_PASSWORD }}

      - name: Build and push image
        run: |
          IMAGE=derechosperuacr2026.azurecr.io/back-derechos:${{ github.sha }}
          docker build -t "$IMAGE" -f BackDerechosPeru/Dockerfile BackDerechosPeru
          docker push "$IMAGE"

      - name: Deploy to Container App
        run: |
          az containerapp update -n back-derechos -g rg-derechosperu \
            --image derechosperuacr2026.azurecr.io/back-derechos:${{ github.sha }}
