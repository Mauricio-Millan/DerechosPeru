name: Build & Push Backend Image to ACR

# Construye la imagen del backend (FastAPI + embeddings) en el runner de GitHub
# y la sube al Azure Container Registry. Esto sortea la limitación de ACR Tasks
# en la suscripción Azure for Students.

on:
  push:
    branches: [main]
    paths:
      - 'BackDerechosPeru/**'
      - '.github/workflows/backend-image.yml'
  workflow_dispatch: {}

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login en ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./BackDerechosPeru
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/backderechos:latest
