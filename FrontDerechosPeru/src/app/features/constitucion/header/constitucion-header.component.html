<header class="header">
  <div class="header__content">
    <div class="header__brand">
      <div class="header__logo" aria-hidden="true">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="18" cy="18" r="18" fill="#C9A84C"/>
          <path d="M18 8C18 8 12 12 12 18C12 22 14.5 25 18 26C21.5 25 24 22 24 18C24 12 18 8 18 8Z" fill="#8B2020" stroke="#7A1A1A" stroke-width="0.5"/>
          <path d="M14 20L18 16L22 20" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M15 22H21" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="18" cy="18" r="17" stroke="#B8922A" stroke-width="1"/>
        </svg>
      </div>

      <div class="header__titles">
        <span class="header__supertitle">REPÚBLICA DEL PERÚ</span>
        <h1 class="header__title">Constitución Política</h1>
        <span class="header__subtitle">Promulgada el 29 de diciembre de 1993</span>
      </div>
    </div>

    <div class="header__right">
      <div class="header__badge" aria-label="206 artículos en 6 títulos">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 19.5A2.5 2.5 0 016.5 17H20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        206 Artículos &nbsp;·&nbsp; 6 Títulos
      </div>

      <div class="header__auth">
        @if (auth.isLoggedIn()) {
          @if (auth.isAdmin()) {
            <a routerLink="/admin" class="header__auth-btn header__auth-btn--admin">Panel Admin</a>
          }
          <span class="header__auth-user" [title]="auth.user()?.email">
            {{ auth.user()?.email }}
          </span>
          <button type="button" class="header__auth-btn" (click)="logout()">Salir</button>
        } @else {
          <a routerLink="/auth" class="header__auth-btn header__auth-btn--primary">Iniciar sesión</a>
        }
      </div>
    </div>
  </div>

  <div class="header__line" aria-hidden="true"></div>
</header>
