<div class="stats-bar">
  <div class="stats-bar__counters">
    <span class="stats-bar__stat">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 6h18M3 12h18M3 18h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <strong>{{ estadisticas?.totalTitulos ?? '—' }}</strong> Títulos
    </span>

    <span class="stats-bar__sep" aria-hidden="true"></span>

    <span class="stats-bar__stat">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 6h16M4 10h16M4 14h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <strong>{{ estadisticas?.totalCapitulos ?? '—' }}</strong> Capítulos
    </span>

    <span class="stats-bar__sep" aria-hidden="true"></span>

    <span class="stats-bar__stat">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/>
        <path d="M7 8h10M7 12h10M7 16h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <strong>{{ estadisticas?.totalArticulos ?? '—' }}</strong> Artículos
    </span>

    <span class="stats-bar__sep" aria-hidden="true"></span>

    <span class="stats-bar__stat">
      <svg width="14" height="18" viewBox="0 0 14 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 1h12v16l-6-3.5L1 17V1z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <strong>{{ totalGuardados }}</strong> Guardados
    </span>
  </div>

  <nav class="stats-bar__tabs" aria-label="Navegación principal">
    <a
      class="stats-bar__tab"
      routerLink="/constitucion/estructura"
      routerLinkActive="stats-bar__tab--active"
    >
      Por estructura
    </a>
    <a
      class="stats-bar__tab"
      routerLink="/constitucion/buscar"
      routerLinkActive="stats-bar__tab--active"
    >
      Buscar / Filtrar
    </a>
    <a
      class="stats-bar__tab"
      routerLink="/constitucion/comparador"
      routerLinkActive="stats-bar__tab--active"
    >
      Comparador
    </a>
    <a
      class="stats-bar__tab"
      routerLink="/constitucion/guardados"
      routerLinkActive="stats-bar__tab--active"
    >
      Guardados
    </a>
    <a
      class="stats-bar__tab"
      routerLink="/constitucion/foro"
      routerLinkActive="stats-bar__tab--active"
    >
      Foro
    </a>
    <a
      class="stats-bar__tab"
      routerLink="/constitucion/historia"
      routerLinkActive="stats-bar__tab--active"
    >
      Historia
    </a>
  </nav>
</div>
